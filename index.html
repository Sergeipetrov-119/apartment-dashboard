<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-white p-6 rounded-2xl shadow-sm">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-900">🏢 우리 동네 아파트 실거래가 대시보드</h1>
            <p class="text-gray-500 mt-2 text-sm" id="loading-status">데이터를 불러오는 중입니다...</p>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">전체 거래 건수</h3>
                <p class="text-3xl font-bold mt-2" id="total-count">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">평균 거래가격</h3>
                <p class="text-2xl font-bold mt-2 text-blue-600" id="avg-price">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">최고 거래가격</h3>
                <p class="text-2xl font-bold mt-2 text-red-500" id="max-price">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">최저 거래가격</h3>
                <p class="text-2xl font-bold mt-2 text-green-600" id="min-price">-</p>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-bold mb-4">월별 평균 거래가격 추이</h2>
            <div class="relative h-72 w-full">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100">
                <h2 class="text-lg font-bold">최근 거래 목록</h2>
            </div>
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">거래일자</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">아파트명</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">법정동</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">전용면적(㎡)</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">층</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b text-right">거래금액</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b text-center">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 text-sm">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTu3Xk75qDioFZd2BjYjvQeikbWY_JZ6p0p_wo3f1hGsymyFbzfdaU2xe5_-FBfRMyfeg8c8Z0Gi3Pk/pub?gid=1135297340&single=true&output=csv';
        let chartInstance = null;

        // 숫자를 한국어 금액(단위: 만원 기준)으로 포맷팅하는 함수
        function formatPriceKR(val) {
            if (isNaN(val) || val === 0) return '-';
            const num = Math.round(val);
            if (num >= 10000) {
                const uk = Math.floor(num / 10000);
                const man = num % 10000;
                return man > 0 ? `${uk}억 ${man.toLocaleString()}만` : `${uk}억`;
            }
            return `${num.toLocaleString()}만`;
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                if (data && data.length > 0) {
                    document.getElementById('loading-status').innerText = `총 ${data.length}건의 데이터를 성공적으로 불러왔습니다.`;
                    processData(data);
                } else {
                    document.getElementById('loading-status').innerText = '데이터를 불러올 수 없습니다. URL을 확인해주세요.';
                }
            },
            error: function(error) {
                document.getElementById('loading-status').innerText = '데이터 로딩 중 오류가 발생했습니다.';
                console.error(error);
            }
        });

        function processData(data) {
            let totalCount = 0;
            let sumPrice = 0;
            let maxPrice = -Infinity;
            let minPrice = Infinity;
            
            const monthlyData = {};
            const validRows = [];

            data.forEach(row => {
                // 필수 데이터 존재 확인
                if(!row['거래일자'] || !row['거래금액']) return;

                // 쉼표 제거 후 숫자로 변환 (실거래가는 보통 '만원' 단위)
                const priceStr = row['거래금액'].replace(/,/g, '').trim();
                const price = parseInt(priceStr, 10);
                
                if (isNaN(price)) return;

                validRows.push(row);
                totalCount++;
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;

                // 거래일자에서 YYYY-MM 추출 (예: 2023.05.12 -> 2023-05)
                const dateStr = row['거래일자'].replace(/\./g, '-');
                const monthMatch = dateStr.match(/(\d{4})[-/]?(\d{2})/);
                if (monthMatch) {
                    const monthKey = `${monthMatch[1]}-${monthMatch[2]}`;
                    if (!monthlyData[monthKey]) {
                        monthlyData[monthKey] = { sum: 0, count: 0 };
                    }
                    monthlyData[monthKey].sum += price;
                    monthlyData[monthKey].count += 1;
                }
            });

            const avgPrice = totalCount > 0 ? sumPrice / totalCount : 0;

            // 요약 카드 업데이트
            document.getElementById('total-count').innerText = `${totalCount.toLocaleString()}건`;
            document.getElementById('avg-price').innerText = formatPriceKR(avgPrice);
            document.getElementById('max-price').innerText = maxPrice !== -Infinity ? formatPriceKR(maxPrice) : '-';
            document.getElementById('min-price').innerText = minPrice !== Infinity ? formatPriceKR(minPrice) : '-';

            // 월별 차트 데이터 준비 (시간순 정렬)
            const labels = Object.keys(monthlyData).sort();
            const chartPrices = labels.map(l => monthlyData[l].sum / monthlyData[l].count);

            renderChart(labels, chartPrices);
            renderTable(validRows);
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가 (만원)',
                        data: data,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#3b82f6',
                        pointHoverBackgroundColor: '#3b82f6',
                        pointHoverBorderColor: '#fff',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '평균: ' + formatPriceKR(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: '#f3f4f6' },
                            ticks: {
                                callback: function(value) {
                                    return (value / 10000) >= 1 ? (value / 10000).toFixed(1) + '억' : value + '만';
                                }
                            }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            // 최신 거래일자 순으로 정렬
            const sortedData = data.sort((a, b) => {
                const dateA = new Date(a['거래일자'].replace(/\./g, '-'));
                const dateB = new Date(b['거래일자'].replace(/\./g, '-'));
                return dateB - dateA;
            });

            sortedData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-blue-50 transition-colors';
                
                // 가격 포맷팅 (원래 텍스트를 파싱하여 깔끔하게 표시)
                const priceNum = parseInt(row['거래금액'].replace(/,/g, ''), 10);
                const priceStr = isNaN(priceNum) ? row['거래금액'] : formatPriceKR(priceNum);

                tr.innerHTML = `
                    <td class="p-4 whitespace-nowrap">${row['거래일자'] || '-'}</td>
                    <td class="p-4 font-medium text-gray-900">${row['아파트명'] || '-'}</td>
                    <td class="p-4 text-gray-500">${row['법정동'] || '-'}</td>
                    <td class="p-4">${row['전용면적(㎡)'] || '-'}</td>
                    <td class="p-4">${row['층'] ? row['층'] + '층' : '-'}</td>
                    <td class="p-4 text-right font-semibold text-blue-600">${priceStr}</td>
                    <td class="p-4 text-center text-gray-500">${row['건축년도'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
