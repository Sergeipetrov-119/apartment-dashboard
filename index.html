<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-white p-6 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-900">🏢 우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-gray-500 mt-2 text-sm" id="loading-status">데이터를 불러오는 중입니다...</p>
            </div>
            
            <!-- 필터 드롭다운 -->
            <div class="w-full md:w-auto">
                <label for="dong-filter" class="sr-only">법정동 선택</label>
                <select id="dong-filter" class="w-full md:w-48 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block p-2.5 outline-none cursor-pointer">
                    <option value="all">전체 동네</option>
                </select>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">🏠 전체 거래 건수</h3>
                <p class="text-3xl font-bold mt-2" id="total-count">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">💰 평균 거래가격</h3>
                <p class="text-2xl font-bold mt-2 text-green-600" id="avg-price">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">📈 최고 거래가격</h3>
                <p class="text-2xl font-bold mt-2 text-emerald-500" id="max-price">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium">📉 최저 거래가격</h3>
                <p class="text-2xl font-bold mt-2 text-teal-600" id="min-price">-</p>
            </div>
        </div>

        <!-- Middle Section: Chart & Top 5 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- Chart Section (Spans 2 columns) -->
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4">📈 월별 평균 거래가격 추이</h2>
                <div class="relative h-72 w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- Top 5 Section (Spans 1 column) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full">
                <h2 class="text-lg font-bold mb-4">🏆 비싼 아파트 TOP 5</h2>
                <div id="top5-list" class="flex flex-col gap-3 overflow-y-auto">
                    <!-- Top 5 Data will be injected here -->
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100">
                <h2 class="text-lg font-bold">최근 거래 목록</h2>
            </div>
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">거래일자</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">아파트명</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b">법정동</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b text-right">전용면적(㎡)</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b text-center">층</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b text-right">거래금액</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 border-b text-center">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 text-sm">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTu3Xk75qDioFZd2BjYjvQeikbWY_JZ6p0p_wo3f1hGsymyFbzfdaU2xe5_-FBfRMyfeg8c8Z0Gi3Pk/pub?gid=1135297340&single=true&output=csv';
        let chartInstance = null;
        let allData = []; // 전체 데이터를 저장할 변수

        // 숫자를 한국어 금액(단위: 만원 기준)으로 포맷팅하는 함수
        function formatPriceKR(val) {
            if (isNaN(val) || val === 0) return '-';
            const num = Math.round(val);
            if (num >= 10000) {
                const uk = Math.floor(num / 10000);
                const man = num % 10000;
                return man > 0 ? `${uk}억 ${man.toLocaleString()}만` : `${uk}억`;
            }
            return `${num.toLocaleString()}만`;
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const rawData = results.data;
                if (rawData && rawData.length > 0) {
                    // 유효한 데이터만 필터링하고 숫자 가격을 미리 계산
                    allData = rawData.filter(row => {
                        if(!row['거래일자'] || !row['거래금액']) return false;
                        const priceStr = row['거래금액'].replace(/,/g, '').trim();
                        const price = parseInt(priceStr, 10);
                        if(isNaN(price)) return false;
                        
                        row.numericPrice = price; // 성능을 위해 숫자형 가격 저장
                        return true;
                    });

                    document.getElementById('loading-status').innerText = `총 ${allData.length}건의 데이터를 성공적으로 불러왔습니다.`;
                    
                    initFilter(allData);
                    updateDashboard('all');
                } else {
                    document.getElementById('loading-status').innerText = '데이터를 불러올 수 없습니다. URL을 확인해주세요.';
                }
            },
            error: function(error) {
                document.getElementById('loading-status').innerText = '데이터 로딩 중 오류가 발생했습니다.';
                console.error(error);
            }
        });

        // 필터 초기화 및 이벤트 리스너 등록
        function initFilter(data) {
            const select = document.getElementById('dong-filter');
            
            // 법정동 목록 추출 및 정렬 (중복 제거)
            const dongs = [...new Set(data.map(row => row['법정동']?.trim()).filter(Boolean))].sort();
            
            dongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                select.appendChild(option);
            });

            // 필터 변경 시 대시보드 업데이트
            select.addEventListener('change', (e) => {
                updateDashboard(e.target.value);
            });
        }

        // 선택된 동네에 맞게 대시보드(카드, 차트, 테이블) 업데이트
        function updateDashboard(selectedDong) {
            const filteredData = selectedDong === 'all' 
                ? allData 
                : allData.filter(row => row['법정동']?.trim() === selectedDong);

            let totalCount = filteredData.length;
            let sumPrice = 0;
            let maxPrice = -Infinity;
            let minPrice = Infinity;
            const monthlyData = {};

            filteredData.forEach(row => {
                const price = row.numericPrice;
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;

                // 거래일자에서 YYYY-MM 추출
                const dateStr = row['거래일자'].replace(/\./g, '-');
                const monthMatch = dateStr.match(/(\d{4})[-/]?(\d{2})/);
                if (monthMatch) {
                    const monthKey = `${monthMatch[1]}-${monthMatch[2]}`;
                    if (!monthlyData[monthKey]) {
                        monthlyData[monthKey] = { sum: 0, count: 0 };
                    }
                    monthlyData[monthKey].sum += price;
                    monthlyData[monthKey].count += 1;
                }
            });

            const avgPrice = totalCount > 0 ? sumPrice / totalCount : 0;

            // 요약 카드 업데이트
            document.getElementById('total-count').innerText = `${totalCount.toLocaleString()}건`;
            document.getElementById('avg-price').innerText = totalCount > 0 ? formatPriceKR(avgPrice) : '-';
            document.getElementById('max-price').innerText = maxPrice !== -Infinity ? formatPriceKR(maxPrice) : '-';
            document.getElementById('min-price').innerText = minPrice !== Infinity ? formatPriceKR(minPrice) : '-';

            // 월별 차트 데이터 준비
            const labels = Object.keys(monthlyData).sort();
            const chartPrices = labels.map(l => monthlyData[l].sum / monthlyData[l].count);

            renderChart(labels, chartPrices);
            renderTop5(filteredData);
            renderTable(filteredData);
        }

        function renderTop5(data) {
            const container = document.getElementById('top5-list');
            container.innerHTML = '';

            // 거래금액 기준 내림차순 정렬 후 상위 5개 추출
            const sortedData = [...data].sort((a, b) => b.numericPrice - a.numericPrice);
            const top5 = sortedData.slice(0, 5);

            if (top5.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm py-4 text-center">데이터가 없습니다.</p>';
                return;
            }

            top5.forEach((row, index) => {
                const rank = index + 1;
                let rankBg = 'bg-gray-100 text-gray-500'; // 4, 5위 기본 스타일
                if (rank === 1) rankBg = 'bg-yellow-400 text-white shadow-md'; // 1위 금색
                else if (rank === 2) rankBg = 'bg-gray-300 text-gray-700 shadow-sm'; // 2위 은색
                else if (rank === 3) rankBg = 'bg-amber-600 text-white shadow-sm'; // 3위 동색

                const priceStr = formatPriceKR(row.numericPrice);

                const item = document.createElement('div');
                item.className = 'flex items-center gap-3 p-3 rounded-xl border border-gray-50 hover:bg-emerald-50 transition-colors bg-gray-50/50';
                
                item.innerHTML = `
                    <div class="w-8 h-8 shrink-0 rounded-full flex items-center justify-center font-bold text-sm ${rankBg}">
                        ${rank}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-gray-900 text-sm truncate" title="${row['아파트명']}">${row['아파트명'] || '-'}</p>
                        <p class="text-xs text-gray-500 truncate">${row['전용면적(㎡)']}㎡ | ${row['층'] ? row['층'] + '층' : '-'}</p>
                    </div>
                    <div class="font-bold text-emerald-600 text-sm whitespace-nowrap text-right pl-2">
                        ${priceStr}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가 (만원)',
                        data: data,
                        borderColor: '#10b981', /* 초록색 계열 (Tailwind emerald-500) */
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#10b981',
                        pointHoverBackgroundColor: '#10b981',
                        pointHoverBorderColor: '#fff',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '평균: ' + formatPriceKR(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: '#f3f4f6' },
                            ticks: {
                                callback: function(value) {
                                    return (value / 10000) >= 1 ? (value / 10000).toFixed(1) + '억' : value + '만';
                                }
                            }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            // 최신 거래일자 순으로 복사 후 정렬 (원본 훼손 방지)
            const sortedData = [...data].sort((a, b) => {
                const dateA = new Date(a['거래일자'].replace(/\./g, '-'));
                const dateB = new Date(b['거래일자'].replace(/\./g, '-'));
                return dateB - dateA;
            });

            sortedData.forEach((row, index) => {
                const tr = document.createElement('tr');
                
                // 짝수/홀수 줄무늬 배경 (even/odd) 및 마우스 오버 효과 추가
                const isEven = index % 2 === 0;
                tr.className = `${isEven ? 'bg-white' : 'bg-gray-50'} hover:bg-emerald-50 transition-colors duration-150`;
                
                // 5억(50,000만) 이상 빨간색 강조, 그 외 초록색
                const priceNum = row.numericPrice;
                const priceStr = formatPriceKR(priceNum);
                const priceClass = priceNum >= 50000 
                    ? 'text-red-500 font-bold' 
                    : 'text-emerald-600 font-medium';

                tr.innerHTML = `
                    <td class="p-4 whitespace-nowrap text-gray-600">${row['거래일자'] || '-'}</td>
                    <td class="p-4 font-semibold text-gray-900">${row['아파트명'] || '-'}</td>
                    <td class="p-4 text-gray-500">${row['법정동'] || '-'}</td>
                    <td class="p-4 text-right text-gray-600">${row['전용면적(㎡)'] || '-'}</td>
                    <td class="p-4 text-center text-gray-600">${row['층'] ? row['층'] + '층' : '-'}</td>
                    <td class="p-4 text-right ${priceClass}">${priceStr}</td>
                    <td class="p-4 text-center text-gray-400">${row['건축년도'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
